application:
  security:
    jwt:
      # Test-only fixture. Real prod key is never committed.
      # Matches `application.security.jwt.*` so WebSecurityConfig resolves it.
      secret-key: "47MOYk+KUBPcWDpJjoQ5ttBUvsb1E6+cDG55GEjpoPI="
      expiration: 3600000
server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false
spring:
  application:
    name: meal-plan-manager-test
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  liquibase:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  h2:
    console:
      enabled: false
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
